<!DOCTYPE html>
<html lang="id" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Titik Lokasi · WinniPresence</title>
  <link rel="icon" type="image/png" href="assets/icon/barcode-scan.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="assets/js/tailwind-config.js"></script>
  <link rel="stylesheet" href="assets/css/app.css" />
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="assets/js/icons.js"></script>
  <script src="assets/js/data.js"></script>
</head>
<body class="h-full bg-slate-50 font-sans text-slate-800" x-data="{ sidebarOpen: false }">
  <div id="overlay-slot"></div>
  <div id="sidebar-slot"></div>

  <div class="lg:pl-72">
    <div id="topbar-slot"></div>

    <main class="p-4 sm:p-6" x-data="lokasi()">
      <div class="grid lg:grid-cols-3 gap-6">
        <!-- Map mock -->
        <div class="lg:col-span-2 rounded-3xl bg-white border border-slate-100 shadow-card overflow-hidden">
          <div class="flex items-center justify-between px-6 py-4 border-b border-slate-100">
            <div>
              <p class="font-semibold text-slate-800">Peta Titik Absensi</p>
              <p class="text-sm text-slate-400">Klik peta untuk menempatkan titik baru.</p>
            </div>
            <span class="inline-flex items-center gap-1.5 text-xs font-medium px-3 py-1 rounded-full bg-brand-50 text-brand-700">
              <span x-html="icon('pin','w-3.5 h-3.5')"></span> <span x-text="points.length"></span> titik aktif
            </span>
          </div>
          <div class="relative h-[460px] bg-gradient-to-br from-brand-50 to-sky-50 cursor-crosshair" @click="addPoint($event)">
            <!-- grid -->
            <div class="absolute inset-0 opacity-40" style="background-image:linear-gradient(#cbd5e1 1px,transparent 1px),linear-gradient(90deg,#cbd5e1 1px,transparent 1px);background-size:40px 40px"></div>
            <!-- fake roads -->
            <div class="absolute top-1/3 left-0 right-0 h-3 bg-white/70"></div>
            <div class="absolute top-0 bottom-0 left-1/2 w-3 bg-white/70"></div>
            <!-- points -->
            <template x-for="(p, i) in points" :key="i">
              <div class="absolute -translate-x-1/2 -translate-y-1/2" :style="`left:${p.x}%;top:${p.y}%`">
                <div class="absolute left-1/2 top-1/2 -translate-x-1/2 -translate-y-1/2 rounded-full bg-brand-500/15"
                     :style="`width:${p.radius/2}px;height:${p.radius/2}px`"></div>
                <div class="relative text-brand-600 drop-shadow" x-html="icon('pin','w-8 h-8')"></div>
              </div>
            </template>
          </div>
        </div>

        <!-- Location list + form -->
        <div class="space-y-6">
          <div class="rounded-3xl bg-white border border-slate-100 shadow-card p-6">
            <p class="font-semibold text-slate-800">Tambah Titik Lokasi</p>
            <form class="mt-4 space-y-3" @submit.prevent="saveForm()">
              <div>
                <label class="block text-sm font-medium text-slate-700 mb-1.5">Nama Lokasi</label>
                <input x-model="form.name" placeholder="cth: Kantor Cabang Bandung" class="w-full px-3 py-2.5 rounded-xl border border-slate-200 text-sm focus:border-brand-500 focus:ring-2 focus:ring-brand-100 outline-none" />
              </div>
              <div class="grid grid-cols-2 gap-3">
                <div>
                  <label class="block text-sm font-medium text-slate-700 mb-1.5">Latitude</label>
                  <input x-model="form.lat" placeholder="-6.2088" class="w-full px-3 py-2.5 rounded-xl border border-slate-200 text-sm focus:border-brand-500 focus:ring-2 focus:ring-brand-100 outline-none" />
                </div>
                <div>
                  <label class="block text-sm font-medium text-slate-700 mb-1.5">Longitude</label>
                  <input x-model="form.lng" placeholder="106.8456" class="w-full px-3 py-2.5 rounded-xl border border-slate-200 text-sm focus:border-brand-500 focus:ring-2 focus:ring-brand-100 outline-none" />
                </div>
              </div>
              <div>
                <label class="block text-sm font-medium text-slate-700 mb-1.5">Radius (meter): <span class="text-brand-600 font-semibold" x-text="form.radius"></span></label>
                <input x-model="form.radius" type="range" min="50" max="500" step="10" class="w-full accent-brand-600" />
              </div>
              <button type="submit" class="w-full py-2.5 rounded-xl bg-brand-600 hover:bg-brand-700 text-white text-sm font-semibold transition">Simpan Titik</button>
            </form>
          </div>

          <div class="rounded-3xl bg-white border border-slate-100 shadow-card overflow-hidden">
            <p class="font-semibold text-slate-800 px-6 py-4 border-b border-slate-100">Daftar Lokasi</p>
            <div class="divide-y divide-slate-50 max-h-64 overflow-y-auto scroll-thin">
              <template x-for="(p, i) in points" :key="i">
                <div class="flex items-center gap-3 px-6 py-3.5 hover:bg-slate-50">
                  <span class="w-9 h-9 rounded-xl bg-brand-50 text-brand-600 grid place-items-center" x-html="icon('pin','w-4 h-4')"></span>
                  <div class="flex-1 min-w-0">
                    <p class="text-sm font-medium text-slate-700 truncate" x-text="p.name"></p>
                    <p class="text-xs text-slate-400">Radius <span x-text="p.radius"></span> m</p>
                  </div>
                  <button @click="points.splice(i,1)" class="w-8 h-8 grid place-items-center rounded-lg text-slate-400 hover:bg-rose-50 hover:text-rose-600" x-html="icon('trash','w-4 h-4')"></button>
                </div>
              </template>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="assets/js/layout.js"></script>
  <script>
    window.PAGE = { role: 'admin', active: 'lokasi', title: 'Titik Lokasi Absensi', subtitle: 'Tentukan area yang valid untuk absensi karyawan' };
    renderShell();

    function lokasi() {
      return {
        form: { name: '', lat: '', lng: '', radius: 100 },
        points: [
          { name: 'Kantor Pusat - Jakarta', x: 50, y: 33, radius: 200 },
          { name: 'Kantor Cabang - Bandung', x: 28, y: 62, radius: 150 },
        ],
        addPoint(e) {
          const rect = e.currentTarget.getBoundingClientRect();
          const x = ((e.clientX - rect.left) / rect.width) * 100;
          const y = ((e.clientY - rect.top) / rect.height) * 100;
          this.points.push({ name: 'Titik Baru ' + (this.points.length + 1), x, y, radius: Number(this.form.radius) || 100 });
        },
        saveForm() {
          if (!this.form.name) return;
          this.points.push({ name: this.form.name, x: 50 + Math.random() * 20 - 10, y: 50 + Math.random() * 20 - 10, radius: Number(this.form.radius) });
          this.form = { name: '', lat: '', lng: '', radius: 100 };
        },
      };
    }
  </script>
</body>
</html>
