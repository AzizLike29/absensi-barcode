<!DOCTYPE html>
<html lang="id" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profil · WinniPresence</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="assets/js/tailwind-config.js"></script>
  <link rel="stylesheet" href="assets/css/app.css" />
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="assets/js/icons.js"></script>
  <script src="assets/js/data.js"></script>
</head>
<body class="h-full bg-slate-50 font-sans text-slate-800" x-data="{ sidebarOpen: false }">
  <div id="overlay-slot"></div>
  <div id="sidebar-slot"></div>

  <div class="lg:pl-72">
    <div id="topbar-slot"></div>

    <main class="p-4 sm:p-6">
      <div class="grid lg:grid-cols-3 gap-6">
        <!-- Profile card -->
        <div class="rounded-3xl bg-white border border-slate-100 shadow-card p-6 text-center">
          <div class="relative inline-block">
            <div class="w-24 h-24 rounded-3xl bg-brand-600 text-white grid place-items-center text-3xl font-bold mx-auto" id="avatar"></div>
            <button class="absolute -bottom-1 -right-1 w-8 h-8 rounded-xl bg-white border border-slate-200 grid place-items-center text-slate-500 shadow-card" id="edit-avatar"></button>
          </div>
          <h2 class="mt-4 text-lg font-bold text-slate-800" id="p-name"></h2>
          <p class="text-sm text-slate-400" id="p-role"></p>
          <span class="mt-3 inline-flex rounded-full px-3 py-1 text-xs font-medium bg-emerald-50 text-emerald-700 ring-1 ring-inset ring-emerald-600/20" id="p-status"></span>
          <div class="mt-6 grid grid-cols-2 gap-3 text-center">
            <div class="rounded-2xl bg-slate-50 p-3">
              <p class="text-xl font-bold text-slate-800">96%</p>
              <p class="text-xs text-slate-400">Kehadiran</p>
            </div>
            <div class="rounded-2xl bg-slate-50 p-3">
              <p class="text-xl font-bold text-slate-800">6</p>
              <p class="text-xs text-slate-400">Sisa Cuti</p>
            </div>
          </div>
        </div>

        <!-- Details -->
        <div class="lg:col-span-2 space-y-6" x-data="{ tab: 'info' }">
          <div class="rounded-3xl bg-white border border-slate-100 shadow-card overflow-hidden">
            <div class="flex border-b border-slate-100">
              <button @click="tab = 'info'" :class="tab === 'info' ? 'text-brand-700 border-brand-600' : 'text-slate-500 border-transparent'" class="px-6 py-4 text-sm font-medium border-b-2 transition">Informasi Pribadi</button>
              <button @click="tab = 'security'" :class="tab === 'security' ? 'text-brand-700 border-brand-600' : 'text-slate-500 border-transparent'" class="px-6 py-4 text-sm font-medium border-b-2 transition">Keamanan</button>
            </div>

            <!-- Info tab -->
            <div x-show="tab === 'info'" class="p-6">
              <div class="grid sm:grid-cols-2 gap-5" id="info-grid"></div>
              <div class="mt-6 flex justify-end">
                <button class="inline-flex items-center gap-2 px-4 py-2.5 rounded-xl bg-brand-600 hover:bg-brand-700 text-white text-sm font-semibold transition">
                  <span id="i-edit"></span> Simpan Perubahan
                </button>
              </div>
            </div>

            <!-- Security tab -->
            <div x-cloak x-show="tab === 'security'" class="p-6 space-y-5 max-w-md">
              <div>
                <label class="block text-sm font-medium text-slate-700 mb-1.5">Password Lama</label>
                <input type="password" placeholder="••••••••" class="w-full px-3 py-2.5 rounded-xl border border-slate-200 text-sm focus:border-brand-500 focus:ring-2 focus:ring-brand-100 outline-none" />
              </div>
              <div>
                <label class="block text-sm font-medium text-slate-700 mb-1.5">Password Baru</label>
                <input type="password" placeholder="••••••••" class="w-full px-3 py-2.5 rounded-xl border border-slate-200 text-sm focus:border-brand-500 focus:ring-2 focus:ring-brand-100 outline-none" />
              </div>
              <div class="flex items-center justify-between rounded-2xl bg-slate-50 p-4">
                <div>
                  <p class="text-sm font-medium text-slate-700">Verifikasi 2 Langkah (OTP)</p>
                  <p class="text-xs text-slate-400">Kode OTP dikirim ke email saat login.</p>
                </div>
                <div x-data="{ on: true }" @click="on = !on" class="w-11 h-6 rounded-full p-0.5 cursor-pointer transition" :class="on ? 'bg-brand-600' : 'bg-slate-300'">
                  <div class="w-5 h-5 rounded-full bg-white transition" :class="on ? 'translate-x-5' : ''"></div>
                </div>
              </div>
              <button class="px-4 py-2.5 rounded-xl bg-brand-600 hover:bg-brand-700 text-white text-sm font-semibold transition">Perbarui Keamanan</button>
            </div>
          </div>
        </div>
      </div>
    </main>
  </div>

  <script src="assets/js/layout.js"></script>
  <script>
    window.PAGE = { role: 'karyawan', active: 'profil', title: 'Profil', subtitle: 'Kelola informasi akun Anda' };
    renderShell();

    const u = APP.currentUser;
    document.getElementById('avatar').textContent = u.avatar;
    document.getElementById('edit-avatar').innerHTML = icon('camera', 'w-4 h-4');
    document.getElementById('p-name').textContent = u.name;
    document.getElementById('p-role').textContent = u.role + ' · ' + u.department;
    document.getElementById('p-status').textContent = u.status;
    document.getElementById('i-edit').innerHTML = icon('check', 'w-4 h-4');

    const fields = [
      ['Nama Lengkap', u.name], ['NIP', u.nip], ['Email', u.email], ['No. Telepon', u.phone],
      ['Departemen', u.department], ['Jabatan', u.role], ['Status Karyawan', u.status], ['Tanggal Bergabung', u.joinDate],
    ];
    document.getElementById('info-grid').innerHTML = fields.map(([label, val]) => `
      <div>
        <label class="block text-xs font-medium text-slate-400 mb-1.5">${label}</label>
        <input value="${val}" class="w-full px-3 py-2.5 rounded-xl border border-slate-200 text-sm text-slate-700 focus:border-brand-500 focus:ring-2 focus:ring-brand-100 outline-none" />
      </div>`).join('');
  </script>
</body>
</html>
