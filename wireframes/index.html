<!DOCTYPE html>
<html lang="id" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Galeri Wireframe · WinniPresence</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <style>body{font-family:Inter,sans-serif}</style>
</head>
<body class="bg-slate-100 text-slate-800">
  <header class="bg-slate-900 text-white">
    <div class="max-w-6xl mx-auto px-6 py-7">
      <h1 class="text-2xl font-bold">Galeri Wireframe</h1>
      <p class="text-slate-300 text-sm mt-1">Sistem Absensi Karyawan — PT Winnicode Garuda Teknologi</p>
      <div class="mt-4 flex flex-wrap gap-2">
        <a href="../index.html" class="px-4 py-2 rounded-lg bg-white/15 text-white text-sm font-semibold hover:bg-white/25">Buka Aplikasi</a>
      </div>
      <p class="text-slate-400 text-xs mt-3">12 wireframe tersedia dalam format PNG (2560×1720) dan SVG.</p>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-6 py-8">
    <div id="grid" class="grid sm:grid-cols-2 gap-6"></div>
  </main>

  <script>
    let MANIFEST = [];

    async function load() {
      MANIFEST = await fetch('manifest.json').then(r => r.json());
      const grid = document.getElementById('grid');
      grid.innerHTML = MANIFEST.map((m, i) => {
        const png = 'png/' + m.name.replace('.svg', '.png');
        const svg = 'svg/' + m.name;
        return `
        <figure class="bg-white rounded-2xl border border-slate-200 overflow-hidden shadow-sm">
          <div class="bg-slate-50 border-b border-slate-100">
            <img src="${png}" alt="${m.title}" loading="lazy" class="w-full block" />
          </div>
          <figcaption class="flex items-center justify-between gap-3 px-4 py-3">
            <div class="min-w-0">
              <p class="text-sm font-semibold text-slate-800 truncate">${String(i + 1).padStart(2, '0')}. ${m.title}</p>
              <p class="text-xs text-slate-400 truncate">${m.file}</p>
            </div>
            <div class="flex gap-2 shrink-0">
              <a href="${svg}" download class="px-3 py-1.5 rounded-lg border border-slate-200 text-xs font-medium text-slate-600 hover:bg-slate-50">SVG</a>
              <a href="${png}" download class="px-3 py-1.5 rounded-lg bg-slate-900 text-white text-xs font-medium hover:bg-slate-700">PNG</a>
            </div>
          </figcaption>
        </figure>`;
      }).join('');
    }

    load();
  </script>
</body>
</html>
