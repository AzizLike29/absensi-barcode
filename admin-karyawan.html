<!DOCTYPE html>
<html lang="id" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Data Karyawan · WinniPresence</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="assets/js/tailwind-config.js"></script>
  <link rel="stylesheet" href="assets/css/app.css" />
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="assets/js/icons.js"></script>
  <script src="assets/js/data.js"></script>
</head>
<body class="h-full bg-slate-50 font-sans text-slate-800" x-data="{ sidebarOpen: false }">
  <div id="overlay-slot"></div>
  <div id="sidebar-slot"></div>

  <div class="lg:pl-72">
    <div id="topbar-slot"></div>

    <main class="p-4 sm:p-6" x-data="karyawan()">
      <section class="rounded-3xl bg-white border border-slate-100 shadow-card overflow-hidden">
        <div class="flex flex-col sm:flex-row sm:items-center justify-between gap-3 px-6 py-4 border-b border-slate-100">
          <div>
            <p class="font-semibold text-slate-800">Data Karyawan</p>
            <p class="text-sm text-slate-400"><span x-text="filtered.length"></span> karyawan terdaftar</p>
          </div>
          <div class="flex flex-wrap items-center gap-2">
            <div class="flex items-center gap-2 px-3 py-2 rounded-xl bg-slate-50 text-slate-400 w-full sm:w-56">
              <span x-html="icon('search','w-4 h-4')"></span>
              <input x-model="q" type="text" placeholder="Cari nama / NIP..." class="bg-transparent text-sm text-slate-600 focus:outline-none flex-1" />
            </div>
            <select x-model="dept" class="px-3 py-2 rounded-xl bg-slate-50 text-sm text-slate-600 focus:outline-none">
              <option value="all">Semua Departemen</option>
              <template x-for="d in depts" :key="d"><option :value="d" x-text="d"></option></template>
            </select>
            <button @click="openForm = true" class="inline-flex items-center gap-2 px-4 py-2 rounded-xl bg-brand-600 hover:bg-brand-700 text-white text-sm font-semibold transition">
              <span x-html="icon('plus','w-4 h-4')"></span> Tambah
            </button>
          </div>
        </div>

        <div class="overflow-x-auto scroll-thin">
          <table class="w-full text-sm">
            <thead>
              <tr class="text-left text-slate-400 border-b border-slate-100">
                <th class="px-6 py-3 font-medium">Karyawan</th>
                <th class="px-6 py-3 font-medium">NIP</th>
                <th class="px-6 py-3 font-medium">Departemen</th>
                <th class="px-6 py-3 font-medium">Status</th>
                <th class="px-6 py-3 font-medium">Kehadiran</th>
                <th class="px-6 py-3 font-medium text-right">Aksi</th>
              </tr>
            </thead>
            <tbody class="divide-y divide-slate-50">
              <template x-for="e in filtered" :key="e.nip">
                <tr class="hover:bg-slate-50">
                  <td class="px-6 py-3.5">
                    <div class="flex items-center gap-3">
                      <span class="w-9 h-9 rounded-full bg-brand-100 text-brand-700 grid place-items-center text-xs font-semibold" x-text="initials(e.name)"></span>
                      <div>
                        <p class="font-medium text-slate-700" x-text="e.name"></p>
                        <p class="text-xs text-slate-400" x-text="e.role"></p>
                      </div>
                    </div>
                  </td>
                  <td class="px-6 py-3.5 tabular-nums text-slate-500" x-text="e.nip"></td>
                  <td class="px-6 py-3.5 text-slate-500" x-text="e.dept"></td>
                  <td class="px-6 py-3.5">
                    <span class="inline-flex rounded-full px-2.5 py-0.5 text-xs font-medium ring-1 ring-inset"
                          :class="e.status === 'Tetap' ? 'bg-brand-50 text-brand-700 ring-brand-600/20' : 'bg-slate-100 text-slate-600 ring-slate-500/20'"
                          x-text="e.status"></span>
                  </td>
                  <td class="px-6 py-3.5">
                    <span class="inline-flex items-center gap-1.5 text-xs font-medium" :class="e.present ? 'text-emerald-600' : 'text-slate-400'">
                      <span class="w-1.5 h-1.5 rounded-full" :class="e.present ? 'bg-emerald-500' : 'bg-slate-300'"></span>
                      <span x-text="e.present ? 'Hadir' : 'Belum absen'"></span>
                    </span>
                  </td>
                  <td class="px-6 py-3.5">
                    <div class="flex items-center justify-end gap-1">
                      <button class="w-8 h-8 grid place-items-center rounded-lg text-slate-400 hover:bg-slate-100 hover:text-brand-600" x-html="icon('edit','w-4 h-4')"></button>
                      <button class="w-8 h-8 grid place-items-center rounded-lg text-slate-400 hover:bg-rose-50 hover:text-rose-600" x-html="icon('trash','w-4 h-4')"></button>
                    </div>
                  </td>
                </tr>
              </template>
              <tr x-show="filtered.length === 0">
                <td colspan="6" class="px-6 py-10 text-center text-slate-400">Tidak ada karyawan yang cocok.</td>
              </tr>
            </tbody>
          </table>
        </div>

        <div class="flex items-center justify-between px-6 py-4 border-t border-slate-100 text-sm text-slate-400">
          <span>Menampilkan <span x-text="filtered.length"></span> dari <span x-text="all.length"></span></span>
          <div class="flex items-center gap-1">
            <button class="w-8 h-8 grid place-items-center rounded-lg border border-slate-200 text-slate-400 hover:bg-slate-50" x-html="icon('arrowLeft','w-4 h-4')"></button>
            <button class="w-8 h-8 grid place-items-center rounded-lg bg-brand-600 text-white text-xs">1</button>
            <button class="w-8 h-8 grid place-items-center rounded-lg border border-slate-200 text-slate-500 hover:bg-slate-50 text-xs">2</button>
            <button class="w-8 h-8 grid place-items-center rounded-lg border border-slate-200 text-slate-400 hover:bg-slate-50" x-html="icon('arrowRight','w-4 h-4')"></button>
          </div>
        </div>
      </section>

      <!-- Add modal -->
      <div x-cloak x-show="openForm" class="fixed inset-0 z-50 grid place-items-center p-4" x-transition.opacity>
        <div class="absolute inset-0 bg-slate-900/40" @click="openForm = false"></div>
        <div class="relative w-full max-w-lg bg-white rounded-3xl shadow-soft p-6 animate-fade-up">
          <div class="flex items-center justify-between">
            <h3 class="text-lg font-semibold text-slate-800">Tambah Karyawan</h3>
            <button @click="openForm = false" class="text-slate-400 hover:text-slate-600 text-xl">&times;</button>
          </div>
          <form class="mt-5 grid sm:grid-cols-2 gap-4" @submit.prevent="openForm = false">
            <div class="sm:col-span-2">
              <label class="block text-sm font-medium text-slate-700 mb-1.5">Nama Lengkap</label>
              <input class="w-full px-3 py-2.5 rounded-xl border border-slate-200 text-sm focus:border-brand-500 focus:ring-2 focus:ring-brand-100 outline-none" />
            </div>
            <div>
              <label class="block text-sm font-medium text-slate-700 mb-1.5">NIP</label>
              <input class="w-full px-3 py-2.5 rounded-xl border border-slate-200 text-sm focus:border-brand-500 focus:ring-2 focus:ring-brand-100 outline-none" />
            </div>
            <div>
              <label class="block text-sm font-medium text-slate-700 mb-1.5">Departemen</label>
              <select class="w-full px-3 py-2.5 rounded-xl border border-slate-200 text-sm focus:border-brand-500 focus:ring-2 focus:ring-brand-100 outline-none">
                <template x-for="d in depts" :key="d"><option x-text="d"></option></template>
              </select>
            </div>
            <div>
              <label class="block text-sm font-medium text-slate-700 mb-1.5">Jabatan</label>
              <input class="w-full px-3 py-2.5 rounded-xl border border-slate-200 text-sm focus:border-brand-500 focus:ring-2 focus:ring-brand-100 outline-none" />
            </div>
            <div>
              <label class="block text-sm font-medium text-slate-700 mb-1.5">Status</label>
              <select class="w-full px-3 py-2.5 rounded-xl border border-slate-200 text-sm focus:border-brand-500 focus:ring-2 focus:ring-brand-100 outline-none">
                <option>Tetap</option><option>Kontrak</option>
              </select>
            </div>
            <div class="sm:col-span-2 flex justify-end gap-2 pt-2">
              <button type="button" @click="openForm = false" class="px-4 py-2.5 rounded-xl border border-slate-200 text-sm font-medium text-slate-600 hover:bg-slate-50">Batal</button>
              <button type="submit" class="px-5 py-2.5 rounded-xl bg-brand-600 hover:bg-brand-700 text-white text-sm font-semibold">Simpan</button>
            </div>
          </form>
        </div>
      </div>
    </main>
  </div>

  <script src="assets/js/layout.js"></script>
  <script>
    window.PAGE = { role: 'admin', active: 'karyawan', title: 'Data Karyawan', subtitle: 'Kelola data dan status karyawan' };
    renderShell();

    function karyawan() {
      return {
        all: APP.employees,
        q: '',
        dept: 'all',
        openForm: false,
        get depts() { return [...new Set(APP.employees.map(e => e.dept))]; },
        get filtered() {
          return this.all.filter(e => {
            const matchQ = (e.name + e.nip).toLowerCase().includes(this.q.toLowerCase());
            const matchD = this.dept === 'all' || e.dept === this.dept;
            return matchQ && matchD;
          });
        },
        initials(n) { return n.split(' ').map(w => w[0]).slice(0, 2).join(''); },
      };
    }
  </script>
</body>
</html>
