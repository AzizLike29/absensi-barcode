<!DOCTYPE html>
<html lang="id" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cuti & Izin · WinniPresence</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="assets/js/tailwind-config.js"></script>
  <link rel="stylesheet" href="assets/css/app.css" />
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script src="assets/js/icons.js"></script>
  <script src="assets/js/data.js"></script>
</head>
<body class="h-full bg-slate-50 font-sans text-slate-800" x-data="{ sidebarOpen: false }">
  <div id="overlay-slot"></div>
  <div id="sidebar-slot"></div>

  <div class="lg:pl-72">
    <div id="topbar-slot"></div>

    <main class="p-4 sm:p-6 space-y-6" x-data="cuti()">
      <!-- Balance cards -->
      <section class="grid sm:grid-cols-3 gap-4">
        <div class="rounded-2xl bg-brand-700 text-white p-5 shadow-soft">
          <p class="text-brand-100 text-sm">Sisa Cuti Tahunan</p>
          <p class="mt-2 text-3xl font-bold">6 <span class="text-base font-medium text-brand-200">/ 12 hari</span></p>
        </div>
        <div class="rounded-2xl bg-white border border-slate-100 p-5 shadow-card">
          <p class="text-slate-400 text-sm">Pengajuan Menunggu</p>
          <p class="mt-2 text-3xl font-bold text-amber-600" x-text="items.filter(i => i.status === 'Menunggu').length"></p>
        </div>
        <div class="rounded-2xl bg-white border border-slate-100 p-5 shadow-card">
          <p class="text-slate-400 text-sm">Disetujui Tahun Ini</p>
          <p class="mt-2 text-3xl font-bold text-emerald-600" x-text="items.filter(i => i.status === 'Disetujui').length"></p>
        </div>
      </section>

      <!-- List -->
      <section class="rounded-3xl bg-white border border-slate-100 shadow-card overflow-hidden">
        <div class="flex items-center justify-between px-6 py-4 border-b border-slate-100">
          <p class="font-semibold text-slate-800">Pengajuan Cuti & Izin</p>
          <button @click="openForm = true" class="inline-flex items-center gap-2 px-4 py-2 rounded-xl bg-brand-600 hover:bg-brand-700 text-white text-sm font-semibold transition">
            <span x-html="icon('plus','w-4 h-4')"></span> Ajukan Baru
          </button>
        </div>
        <div class="overflow-x-auto scroll-thin">
          <table class="w-full text-sm">
            <thead>
              <tr class="text-left text-slate-400 border-b border-slate-100">
                <th class="px-6 py-3 font-medium">ID</th>
                <th class="px-6 py-3 font-medium">Jenis</th>
                <th class="px-6 py-3 font-medium">Periode</th>
                <th class="px-6 py-3 font-medium">Durasi</th>
                <th class="px-6 py-3 font-medium">Alasan</th>
                <th class="px-6 py-3 font-medium">Status</th>
              </tr>
            </thead>
            <tbody class="divide-y divide-slate-50">
              <template x-for="it in items" :key="it.id">
                <tr class="hover:bg-slate-50">
                  <td class="px-6 py-3.5 font-medium text-slate-700" x-text="it.id"></td>
                  <td class="px-6 py-3.5 text-slate-600" x-text="it.type"></td>
                  <td class="px-6 py-3.5 text-slate-500"><span x-text="fmtDate(it.from)"></span> – <span x-text="fmtDate(it.to)"></span></td>
                  <td class="px-6 py-3.5 text-slate-500"><span x-text="it.days"></span> hari</td>
                  <td class="px-6 py-3.5 text-slate-500 max-w-[180px] truncate" x-text="it.reason"></td>
                  <td class="px-6 py-3.5"><span class="inline-flex rounded-full px-2.5 py-0.5 text-xs font-medium ring-1 ring-inset" :class="statusBadge(it.status)" x-text="it.status"></span></td>
                </tr>
              </template>
            </tbody>
          </table>
        </div>
      </section>

      <!-- Modal form -->
      <div x-cloak x-show="openForm" class="fixed inset-0 z-50 grid place-items-center p-4" x-transition.opacity>
        <div class="absolute inset-0 bg-slate-900/40" @click="openForm = false"></div>
        <div class="relative w-full max-w-lg bg-white rounded-3xl shadow-soft p-6 animate-fade-up" @keydown.escape.window="openForm = false">
          <div class="flex items-center justify-between">
            <h3 class="text-lg font-semibold text-slate-800">Ajukan Cuti / Izin</h3>
            <button @click="openForm = false" class="text-slate-400 hover:text-slate-600 text-xl">&times;</button>
          </div>
          <form class="mt-5 space-y-4" @submit.prevent="submit()">
            <div>
              <label class="block text-sm font-medium text-slate-700 mb-1.5">Jenis Pengajuan</label>
              <select x-model="form.type" class="w-full px-3 py-2.5 rounded-xl border border-slate-200 text-sm focus:border-brand-500 focus:ring-2 focus:ring-brand-100 outline-none">
                <option>Cuti Tahunan</option>
                <option>Izin</option>
                <option>Sakit</option>
              </select>
            </div>
            <div class="grid grid-cols-2 gap-3">
              <div>
                <label class="block text-sm font-medium text-slate-700 mb-1.5">Dari Tanggal</label>
                <input type="date" x-model="form.from" class="w-full px-3 py-2.5 rounded-xl border border-slate-200 text-sm focus:border-brand-500 focus:ring-2 focus:ring-brand-100 outline-none" />
              </div>
              <div>
                <label class="block text-sm font-medium text-slate-700 mb-1.5">Sampai Tanggal</label>
                <input type="date" x-model="form.to" class="w-full px-3 py-2.5 rounded-xl border border-slate-200 text-sm focus:border-brand-500 focus:ring-2 focus:ring-brand-100 outline-none" />
              </div>
            </div>
            <div>
              <label class="block text-sm font-medium text-slate-700 mb-1.5">Alasan</label>
              <textarea x-model="form.reason" rows="3" placeholder="Jelaskan alasan pengajuan..." class="w-full px-3 py-2.5 rounded-xl border border-slate-200 text-sm focus:border-brand-500 focus:ring-2 focus:ring-brand-100 outline-none resize-none"></textarea>
            </div>
            <div>
              <label class="block text-sm font-medium text-slate-700 mb-1.5">Lampiran (opsional)</label>
              <div class="flex items-center gap-2 px-3 py-2.5 rounded-xl border border-dashed border-slate-300 text-sm text-slate-400">
                <span x-html="icon('document','w-4 h-4')"></span> Seret berkas atau klik untuk unggah
              </div>
            </div>
            <p x-cloak x-show="error" class="text-sm text-rose-600" x-text="error"></p>
            <div class="flex justify-end gap-2 pt-2">
              <button type="button" @click="openForm = false" class="px-4 py-2.5 rounded-xl border border-slate-200 text-sm font-medium text-slate-600 hover:bg-slate-50">Batal</button>
              <button type="submit" class="px-5 py-2.5 rounded-xl bg-brand-600 hover:bg-brand-700 text-white text-sm font-semibold">Kirim Pengajuan</button>
            </div>
          </form>
        </div>
      </div>

      <!-- Toast -->
      <div x-cloak x-show="toast" x-transition class="fixed bottom-6 right-6 z-50 flex items-center gap-3 bg-white border border-slate-100 shadow-soft rounded-2xl px-4 py-3">
        <span class="w-8 h-8 rounded-lg bg-emerald-50 text-emerald-600 grid place-items-center" x-html="icon('check','w-4 h-4')"></span>
        <p class="text-sm text-slate-700">Pengajuan terkirim & menunggu persetujuan HR.</p>
      </div>
    </main>
  </div>

  <script src="assets/js/layout.js"></script>
  <script>
    window.PAGE = { role: 'karyawan', active: 'cuti', title: 'Cuti & Izin', subtitle: 'Ajukan dan pantau status pengajuan Anda' };
    renderShell();

    function cuti() {
      return {
        items: JSON.parse(JSON.stringify(APP.leaves)),
        openForm: false,
        toast: false,
        error: '',
        form: { type: 'Cuti Tahunan', from: '', to: '', reason: '' },
        submit() {
          this.error = '';
          if (!this.form.from || !this.form.to || !this.form.reason) {
            this.error = 'Lengkapi tanggal dan alasan pengajuan.';
            return;
          }
          const d1 = new Date(this.form.from), d2 = new Date(this.form.to);
          const days = Math.max(1, Math.round((d2 - d1) / 86400000) + 1);
          const prefix = this.form.type === 'Cuti Tahunan' ? 'CT' : this.form.type === 'Izin' ? 'IZ' : 'SK';
          this.items.unshift({
            id: prefix + '-' + String(Math.floor(Math.random() * 9000) + 1000),
            type: this.form.type, from: this.form.from, to: this.form.to,
            days, status: 'Menunggu', reason: this.form.reason,
          });
          this.openForm = false;
          this.form = { type: 'Cuti Tahunan', from: '', to: '', reason: '' };
          this.toast = true;
          setTimeout(() => (this.toast = false), 3000);
        },
      };
    }
  </script>
</body>
</html>
